spring:
  config:
    import: optional:classpath:.env[.properties]
  application:
    name: anime-service
  threads:
    virtual:
      enabled: true
  mvc:
    apiversion:
      use:
        header: X-API-Version
      default: 1
  datasource:
    url: jdbc:mysql://localhost:3306/anime-service?useTimeZone=true&serverTimezone=UTC&createDataBaseIfNotExist=true
    username: ${ENV_ROOT_USER}
    password: ${ENV_ROOT_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
server:
  servlet:
    context-path: /
  tomcat:
    threads:
      max: 20

